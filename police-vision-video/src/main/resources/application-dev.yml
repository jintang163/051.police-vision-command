spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/police_vision?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: root123
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 50
      max-wait: 3000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5
          max-wait: 3000ms

  elasticsearch:
    uris: http://127.0.0.1:9200
    username: elastic
    password: elastic

  neo4j:
    uri: bolt://127.0.0.1:7687
    authentication:
      username: neo4j
      password: neo4j123

  minio:
    endpoint: http://127.0.0.1:9000
    accessKey: minioadmin
    secretKey: minioadmin
    bucketName: police-vision

  rocketmq:
    name-server: 127.0.0.1:9876
    producer:
      group: police-vision-video-producer-group
      sendMessageTimeout: 3000

  sentinel:
    transport:
      dashboard: 127.0.0.1:8858
      port: 8724

  seata:
    enabled: true
    application-id: ${spring.application.name}
    tx-service-group: police-vision-tx-group
    service:
      vgroup-mapping:
        police-vision-tx-group: default
    registry:
      type: nacos
      nacos:
        server-addr: 127.0.0.1:8848
        namespace: police-vision
        group: SEATA_GROUP
        cluster: default
    config:
      type: nacos
      nacos:
        server-addr: 127.0.0.1:8848
        namespace: police-vision
        group: SEATA_GROUP

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.police.vision.common.entity,com.police.vision.video.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  setting:
    language: zh_cn

ai:
  arcface:
    enabled: true
    base-url: http://127.0.0.1:8000
    api-key: arcface-api-key-2024
    extract-endpoint: /api/v1/face/extract
    compare-endpoint: /api/v1/face/compare
    search-endpoint: /api/v1/face/search
    timeout: 10000
  yolov8:
    enabled: true
    base-url: http://127.0.0.1:8001
    api-key: yolov8-api-key-2024
    plate-endpoint: /api/v1/plate/detect
    behavior-endpoint: /api/v1/behavior/analyze
    detect-endpoint: /api/v1/object/detect
    timeout: 15000
  behavior:
    enabled: true
    base-url: http://127.0.0.1:8002
    api-key: behavior-api-key-2024
    analyze-endpoint: /api/v1/behavior/analyze
    timeout: 30000

video:
  ffmpeg:
    path: ffmpeg
    default-duration: 20
    clip-before-seconds: 10
    clip-after-seconds: 10
  rtsp:
    transport: tcp
    timeout: 10000
    buffer-size: 1048576

flv:
  server:
    enabled: true
    host: 127.0.0.1
    port: 8086
    rtmp-port: 1935
    secret: flv-live-secret-2024
