server:
  port: 8089

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/police_vision?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8
    username: root
    password: root123

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      timeout: 10000ms

  kafka:
    bootstrap-servers: 127.0.0.1:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: 1
      retries: 3
      batch-size: 16384
      linger-ms: 1
      buffer-memory: 33554432
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: traffic-capture-consumer-group
      auto-offset-reset: latest
      enable-auto-commit: false
      max-poll-records: 500
      max-poll-interval-ms: 300000
    listener:
      ack-mode: manual
      concurrency: 3

  elasticsearch:
    uris: http://127.0.0.1:9200
    username:
    password:
    connection-timeout: 10s
    read-timeout: 30s

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: police-traffic-producer-group
    send-message-timeout: 3000
  consumer:
    group: police-traffic-consumer-group

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.police.vision.traffic.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

sentinel:
  transport:
    port: 8719
    dashboard: 127.0.0.1:8858
  eager: true
  datasource:
    ds:
      nacos:
        server-addr: 127.0.0.1:8848
        dataId: ${spring.application.name}-sentinel
        groupId: SENTINEL_GROUP
        rule-type: flow

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.police.vision: info
    org.springframework.kafka: info
    org.elasticsearch: info
