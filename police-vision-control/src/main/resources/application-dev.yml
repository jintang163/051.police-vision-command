server:
  port: 8088
  servlet:
    context-path: /

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/police_vision?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      timeout: 3000ms
    neo4j:
      uri: bolt://127.0.0.1:7687
      username: neo4j
      password: neo4j123
      open-in-view: false

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.police.vision.control.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: police-control-producer-group
    send-message-timeout: 3000

control:
  fence:
    enabled: true
    check-interval: 5000
  visitor:
    enabled: true
  aggregation:
    area-size: 3
    window-minutes: 10
  personnel:
      portrait-days: 30

# xxl-job 配置
xxl:
  job:
    enabled: true
    admin-addresses: http://127.0.0.1:8080/xxl-job-admin
    access-token: default_token
    executor:
      appname: police-vision-control-executor
      ip:
      port: 9999
      logpath: ./logs/xxl-job/jobhandler
      logretentiondays: 30

# DeepSeek 大模型配置
deepseek:
  enabled: true
  api-url: https://api.deepseek.com/v1/chat/completions
  api-key: sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  model: deepseek-chat
  max-tokens: 4096
  temperature: 0.7
  top-p: 0.9
  connect-timeout: 30
  read-timeout: 120
  retry-count: 3

# Elasticsearch 配置
elasticsearch:
  enabled: true
  hosts:
    - 127.0.0.1:9200
  scheme: http
  username:
  password:
  connect-timeout: 5000
  socket-timeout: 60000
  case-index: police_case_info
  opinion-index: public_opinion

# 情报研判中心配置
intelligence:
  report:
    daily-cron: "0 0 6 * * ?"
    weekly-cron: "0 0 7 ? * MON"
    monthly-cron: "0 0 8 1 * ?"
    history-days: 30
    auto-generate: true
  crawler:
    default-thread-count: 5
    default-crawl-depth: 3
    default-sleep-millis: 1000
    default-timeout-seconds: 30
    user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    auto-sentiment: true
  cluster:
    similarity-threshold: 0.75
    time-window-hours: 72
    min-cluster-size: 2
    max-clusters: 100
    default-cron: "0 0 */4 * * ?"
  prediction:
    predict-hours: 24
    history-days: 90
    grid-size-meters: 500
    risk-threshold: 0.6
    default-cron: "0 0 5 * * ?"
    sarima-auto-tune: true

# ========= 阿里云语音机器人配置 =========
aliyun:
  dyvms:
    enabled: true
    access-key-id: LTAI5tYourAccessKeyId
    access-key-secret: YourAccessKeySecret
    endpoint: dyvmsapi.aliyuncs.com
    region-id: cn-hangzhou
    called-show-number: "01012345678"
    tts-code: xiaoyun
    speed: 0
    volume: 0
    pitch-rate: 0
    connect-timeout: 10
    read-timeout: 60
    polling-interval: 30
    max-polling-times: 60
    default-auto-callback-delay-hours: 24

# ========= 警情回访调度配置 =========
callback:
  default-template-id: TPL001
  max-retry-times: 3
  retry-interval-minutes: 30
  working-hours-start: 8
  working-hours-end: 20
  auto-transfer-satisfaction-threshold: 3
  auto-transfer-sentiment-threshold: 0
  batch-size: 50
  max-concurrent-calls: 20
  save-recording: true
  asr-enabled: true
